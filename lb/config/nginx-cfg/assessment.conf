proxy_cache_path /tmp/net_cache/ keys_zone=net_cache:10m;

# WebSocket configuration  
map $http_upgrade $connection_upgrade {  
    default upgrade;  
    ''      close;  
}

# Extract the data after the final period (.) in the  
# JSESSIONID cookie and store it in the $route_cookie variable.  
map $cookie_jsessionid $route_cookie {  
    ~.+\.(?P<route>w+)$ $route;  
}

# Search the URL for a trailing jsessionid parameter, extract the  
# data after the final period (.), and store it in  
# the $route_uri variable.  
map $request_uri $route_uri {  
    jsessionid=.+\.(?P<route>w+)$ $route;
}

upstream dev_net {
    zone dev_net 128k;
    server 192.168.2.1:8443;
}

server {
    if ($host = security.example.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

  
    listen 80;
    server_name security.example.com;
    # Redirect all HTTP requests to HTTPS  
    location / {  
        return 301 https://$server_name$request_uri;  
     }  
}

server {  
    listen 9443 ssl;
    http2 on;  
    server_name security.example.com;

    # Required for live activity monitoring of HTTPS traffic  
    ssl_certificate /etc/nginx/cert/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/nginx/cert/privkey.pem; # managed by Certbot
    include /opt/nginx/nginx-cfg/options-ssl-nginx.conf; # managed by Certbot
    #ssl_dhparam /etc/nginx/cert/ssl-dhparams.pem; # managed by Certbot

    gzip off;
    proxy_max_temp_file_size 0;
    charset utf-8;

    location /nginx_status {
        stub_status on;
        access_log off;
    }

    location / {

        root /var/www/html/;
        proxy_pass https://dev_net;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host; # new
        proxy_set_header X-Forwarded-Server $host; # new
        proxy_set_header X-Forwarded-Ssl on; # new
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
}

